<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Tales of Nightmare</title>
  <!-- A bolder cut of the mark. The line-drawn face is too fine to survive a
       16px tab, so the favicon keeps only the two things that still read at
       that size: the crescent, and one closed eye. -->
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#161d28"/>
      <stop offset="100%" stop-color="#080b11"/>
    </linearGradient>
    <mask id="c">
      <rect width="64" height="64" fill="#000"/>
      <circle cx="36" cy="25" r="16" fill="#fff"/>
      <circle cx="45" cy="19" r="14" fill="#000"/>
    </mask>
  </defs>

  <rect width="64" height="64" rx="9" fill="url(#ground)"/>
  <circle cx="36" cy="25" r="16" fill="#6183bd" mask="url(#c)"/>

  <!-- closed eye, heavy enough to hold at small sizes -->
  <path d="M18 46 C25 39 39 39 46 46" fill="none" stroke="#ece4d6"
        stroke-width="3.4" stroke-linecap="round"/>

  <rect x="0.7" y="0.7" width="62.6" height="62.6" rx="8.5" fill="none"
        stroke="#a3b8d2" stroke-opacity="0.14"/>
</svg>
